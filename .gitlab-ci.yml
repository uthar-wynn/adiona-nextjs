stages:
  - build

variables:
  DOCKER_IMAGE: "$DOCKERHUB_USERNAME/thor"
  DOCKER_DRIVER: overlay2

build_and_push:
  stage: build
  tags:
    - docker
    - k3s
  image: docker:27
  script:
    - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
    - docker version
    - docker info

    # Enable multi-arch emulation (QEMU/binfmt)
    - docker run --privileged --rm tonistiigi/binfmt --install all

    # Use a buildx builder that supports multi-arch builds
    - docker buildx create --name multi --driver docker-container --use || docker buildx use multi
    - docker buildx inspect --bootstrap

    - docker buildx build --platform linux/arm64 --build-arg NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY="$NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY" -t "$DOCKER_IMAGE:latest" -t "$DOCKER_IMAGE:$CI_PIPELINE_IID" --push .
  only:
    - main
